<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SleepCare 医生端</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

    /* ===== 登录页 ===== */
    .login-box {
      max-width: 400px;
      margin: 80px auto;
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      text-align: center;
    }
    .login-title {
      font-size: 26px;
      font-weight: 800;
      color: #1a73e8;
      margin-bottom: 8px;
    }
    .login-subtitle { color: #999; font-size: 14px; margin-bottom: 30px; }
    .form-group { margin-bottom: 18px; text-align: left; }
    .form-label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .form-input {
      width: 100%;
      height: 46px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .form-input:focus { outline: none; border-color: #1a73e8; }
    .login-btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #1a73e8, #4a90d9);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .login-btn:hover { opacity: 0.9; }
    .switch-btn {
      margin-top: 16px;
      color: #1a73e8;
      font-size: 14px;
      cursor: pointer;
      background: none;
      border: none;
    }
    .error-tip { color: #e53935; font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ===== 顶部栏 ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }
    .header-title { font-size: 20px; font-weight: 700; color: #1a73e8; }
    .header-user { font-size: 14px; color: #666; }
    .logout-btn {
      padding: 6px 16px;
      background: #f0f4ff;
      color: #1a73e8;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin-left: 12px;
    }

    /* ===== 患者列表 ===== */
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #222; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state .emoji { font-size: 60px; margin-bottom: 12px; }
    .patient-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .patient-info { flex: 1; }
    .patient-name { font-size: 18px; font-weight: 700; color: #222; margin-bottom: 4px; }
    .patient-meta { font-size: 13px; color: #888; }
    .patient-score { font-size: 24px; font-weight: 800; color: #1a73e8; margin-right: 16px; }
    .status-tag {
      padding: 5px 12px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      margin-right: 12px;
    }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-active { background: #d3f9d8; color: #198754; }
    .action-btn {
      padding: 8px 18px;
      border-radius: 18px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-confirm { background: #1a73e8; color: #fff; }
    .btn-view { background: #f0f4ff; color: #1a73e8; }
    .btn-note { background: #fff4e6; color: #e67700; margin-left: 8px; }

    /* ===== 弹窗 ===== */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      text-align: center;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .modal-text { color: #666; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 12px; justify-content: center; }
    .modal-btn { padding: 10px 24px; border-radius: 20px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; }
    .modal-btn-cancel { background: #f0f0f0; color: #666; }
    .modal-btn-confirm { background: #1a73e8; color: #fff; }
    .modal-btn-danger { background: #e53935; color: #fff; }

    /* ===== 报告页 ===== */
    .report-page { display: none; }
    .report-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }
    .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .report-name { font-size: 22px; font-weight: 800; }
    .back-btn { padding: 8px 16px; background: #f0f4ff; color: #1a73e8; border: none; border-radius: 16px; cursor: pointer; font-weight: 600; }
    .score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .score-item { text-align: center; padding: 16px; background: #f8f9fa; border-radius: 12px; }
    .score-value { font-size: 28px; font-weight: 800; color: #1a73e8; }
    .score-label { font-size: 13px; color: #888; margin-top: 6px; }
    .chart-box { width: 100%; height: 320px; border-radius: 12px; }
    .note-section { margin-top: 20px; }
    .note-label { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 8px; display: block; }
    .note-textarea {
      width: 100%; min-height: 100px;
      border: 1px solid #ddd; border-radius: 12px;
      padding: 12px; font-size: 14px; resize: vertical;
    }
    .save-note-btn {
      margin-top: 12px; padding: 10px 24px;
      background: #e67700; color: #fff; border: none;
      border-radius: 20px; font-weight: 700; cursor: pointer;
    }
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 12px 24px;
      border-radius: 24px; font-size: 14px; z-index: 2000;
      display: none;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>

<div class="container">

  <!-- 登录页 -->
  <div id="loginPage" class="login-box">
    <div class="login-title">👨‍⚕️ SleepCare 医生端</div>
    <div class="login-subtitle" id="loginModeText">医生登录 / 注册</div>

    <div class="form-group">
      <label class="form-label">手机号</label>
      <input type="text" id="phone" class="form-input" placeholder="请输入医生手机号" value="13811111111">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input type="password" id="password" class="form-input" placeholder="请输入密码" value="123456">
    </div>
    <div class="form-group" id="nicknameGroup" style="display:none;">
      <label class="form-label">昵称</label>
      <input type="text" id="nickname" class="form-input" placeholder="请输入昵称">
    </div>

    <button class="login-btn" id="submitBtn">登录</button>
    <div class="error-tip" id="loginError"></div>

    <button class="switch-btn" id="switchBtn">还没有账号？立即注册</button>
  </div>

  <!-- 患者列表页 -->
  <div id="listPage" style="display:none;">
    <div class="header">
      <div class="header-title">医生工作台</div>
      <div>
        <span class="header-user" id="userName">李医生</span>
        <button class="logout-btn" onclick="logout()">退出</button>
      </div>
    </div>

    <div class="section-title">患者授权列表</div>
    <div id="patientList"></div>
  </div>

  <!-- 报告详情页 -->
  <div id="reportPage" class="report-page">
    <div class="header">
      <div class="header-title">患者睡眠报告</div>
      <button class="back-btn" onclick="backToList()">← 返回列表</button>
    </div>

    <div class="report-card">
      <div class="report-header">
        <div class="report-name" id="reportPatientName">患者姓名</div>
      </div>
      <div class="score-grid" id="scoreGrid">
        <div class="score-item"><div class="score-value" id="scoreVal">-</div><div class="score-label">睡眠评分</div></div>
        <div class="score-item"><div class="score-value" id="totalVal">-</div><div class="score-label">总时长</div></div>
        <div class="score-item"><div class="score-value" id="deepVal">-</div><div class="score-label">深睡比例</div></div>
        <div class="score-item"><div class="score-value" id="awakeVal">-</div><div class="score-label">觉醒次数</div></div>
      </div>
      <div id="trendChart" class="chart-box"></div>
    </div>

    <div class="report-card note-section">
      <label class="note-label">📝 干预建议</label>
      <textarea id="doctorNote" class="note-textarea" placeholder="请输入对患者的睡眠干预建议..."></textarea>
      <button class="save-note-btn" onclick="saveNote()">保存建议</button>
    </div>
  </div>

</div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-title">确认授权</div>
    <div class="modal-text" id="confirmText">是否确认接受该患者的授权请求？</div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn modal-btn-confirm" onclick="doConfirm()">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // 全局
  const API_BASE = window.location.origin;
  let token = localStorage.getItem('doctorToken') || '';
  let currentDoctor = null;
  let patients = [];
  let currentPatient = null;
  let currentAuthId = null;
  let isRegister = false;
  let myChart = null;

  // 页面元素
  const loginPage = document.getElementById('loginPage');
  const listPage = document.getElementById('listPage');
  const reportPage = document.getElementById('reportPage');
  const nicknameGroup = document.getElementById('nicknameGroup');
  const submitBtn = document.getElementById('submitBtn');
  const switchBtn = document.getElementById('switchBtn');
  const loginModeText = document.getElementById('loginModeText');
  const loginError = document.getElementById('loginError');

  // 切换登录/注册
  switchBtn.addEventListener('click', () => {
    isRegister = !isRegister;
    if (isRegister) {
      submitBtn.textContent = '注册';
      switchBtn.textContent = '已有账号？立即登录';
      loginModeText.textContent = '医生注册（role=doctor）';
      nicknameGroup.style.display = 'block';
    } else {
      submitBtn.textContent = '登录';
      switchBtn.textContent = '还没有账号？立即注册';
      loginModeText.textContent = '医生登录';
      nicknameGroup.style.display = 'none';
    }
  });

  submitBtn.addEventListener('click', () => {
    if (isRegister) doRegister(); else doLogin();
  });

  // 登录
  async function doLogin() {
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    loginError.textContent = '';

    const res = await post('/api/v1/auth/login', { phone, password });
    if (res.code === 0) {
      token = res.data.token;
      localStorage.setItem('doctorToken', token);
      currentDoctor = { name: res.data.nickname };
      showList();
    } else {
      loginError.textContent = res.message || '登录失败';
    }
  }

  // 注册（强制 role=doctor）
  async function doRegister() {
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const nickname = document.getElementById('nickname').value.trim() || '医生';
    loginError.textContent = '';

    const res = await post('/api/v1/auth/register', { phone, password, nickname, role: 'doctor' });
    if (res.code === 0) {
      showToast('注册成功，请登录');
      isRegister = false;
      switchBtn.click();
    } else {
      loginError.textContent = res.message || '注册失败';
    }
  }

  // 显示患者列表
  async function showList() {
    loginPage.style.display = 'none';
    listPage.style.display = 'block';
    reportPage.style.display = 'none';

    document.getElementById('userName').textContent = currentDoctor?.name || '医生';

    const res = await get('/api/doctor/patients');
    if (res.code === 0) {
      patients = res.data || [];
      renderPatientList();
    } else {
      showToast(res.message || '加载失败');
      if (res.code === 401) logout();
    }
  }

  // 渲染列表
  function renderPatientList() {
    const listEl = document.getElementById('patientList');
    if (patients.length === 0) {
      listEl.innerHTML = '<div class="empty-state"><div class="emoji">🩺</div><div>暂无患者授权请求</div></div>';
      return;
    }

    listEl.innerHTML = patients.map(p => {
      const statusText = p.status === 'pending' ? '待确认' : '已授权';
      const statusClass = p.status === 'pending' ? 'status-pending' : 'status-active';
      const scoreText = p.latest_score != null ? p.latest_score : '-';
      const btn = p.status === 'pending'
        ? `<button class="action-btn btn-confirm" onclick="openConfirm(${p.id}, '${p.patient_name}')">确认授权</button>`
        : `<button class="action-btn btn-view" onclick="viewReport(${p.patient_id}, '${p.patient_name}', ${p.id})">查看报告</button>`;
      return `
        <div class="patient-card">
          <div class="patient-info">
            <div class="patient-name">${p.patient_name} <span class="patient-meta">${p.patient_phone}</span></div>
            <div class="patient-meta">
              <span class="status-tag ${statusClass}">${statusText}</span>
              有效期至 ${p.expire_date}
            </div>
          </div>
          <div style="display:flex;align-items:center;">
            <div class="patient-score">${scoreText}</div>
            ${btn}
          </div>
        </div>
      `;
    }).join('');
  }

  // 确认授权弹窗
  function openConfirm(authId, patientName) {
    currentAuthId = authId;
    document.getElementById('confirmText').textContent = `是否确认接受「${patientName}」患者的授权请求？`;
    document.getElementById('confirmModal').classList.add('active');
  }
  function closeModal() {
    document.getElementById('confirmModal').classList.remove('active');
  }
  async function doConfirm() {
    closeModal();
    const res = await put('/api/doctor/confirm', { auth_id: currentAuthId });
    if (res.code === 0) {
      showToast('授权已确认');
      showList();
    } else {
      showToast(res.message || '确认失败');
    }
  }

  // 查看报告
  async function viewReport(patientId, patientName, authId) {
    currentPatient = { id: patientId, name: patientName };
    currentAuthId = authId;
    listPage.style.display = 'none';
    reportPage.style.display = 'block';
    document.getElementById('reportPatientName').textContent = patientName;

    // 获取报告数据
    const res = await get(`/api/doctor/patient/data?patient_id=${patientId}`);
    if (res.code === 0 && res.data) {
      const d = res.data;
      document.getElementById('scoreVal').textContent = d.sleep_score ?? '-';
      const h = Math.floor((d.total_sleep_minutes || 0) / 60);
      const m = (d.total_sleep_minutes || 0) % 60;
      document.getElementById('totalVal').textContent = `${h}h${m}m`;
      document.getElementById('deepVal').textContent = (d.deep_ratio || 0) + '%';
      document.getElementById('awakeVal').textContent = d.awake_count ?? '-';

      drawTrendChart(d.sleep_stages, d.noise);
    } else {
      showToast(res.message || '暂无报告数据');
      document.getElementById('scoreVal').textContent = '-';
      document.getElementById('totalVal').textContent = '-';
      document.getElementById('deepVal').textContent = '-';
      document.getElementById('awakeVal').textContent = '-';
      if (myChart) myChart.dispose();
    }

    // 获取已有建议
    const noteRes = await get(`/api/doctor/note?auth_id=${authId}`);
    document.getElementById('doctorNote').value = (noteRes.code === 0 && noteRes.data) ? noteRes.data.note : '';
  }

  // ECharts 趋势图（睡眠分期）
  function drawTrendChart(stages, noise) {
    const chartDom = document.getElementById('trendChart');
    if (myChart) myChart.dispose();
    myChart = echarts.init(chartDom);

    const stageData = [];
    const stageMap = { awake: 0, light: 1, deep: 2, rem: 3 };
    if (Array.isArray(stages)) {
      stages.forEach((item, index) => {
        // 兼容字符串格式（如 "awake"）和数字格式
        const val = stageMap[item.stage] !== undefined ? stageMap[item.stage] : item.stage;
        stageData.push([index, val]);
      });
    }

    const option = {
      title: { text: '睡眠分期趋势', left: 'center', textStyle: { fontSize: 16 } },
      tooltip: { trigger: 'axis' },
      grid: { left: '8%', right: '8%', bottom: '10%', top: '18%' },
      xAxis: { type: 'category', data: stageData.map((_, i) => i), name: '时间点' },
      yAxis: { type: 'value', min: 0, max: 3, name: '分期', interval: 1 },
      series: [{
        data: stageData.map(item => item[1]),
        type: 'line',
        smooth: true,
        lineStyle: { color: '#1a73e8', width: 3 },
        itemStyle: { color: '#1a73e8' },
        areaStyle: { color: 'rgba(26,115,232,0.1)' }
      }]
    };
    myChart.setOption(option);
  }

  // 保存建议
  async function saveNote() {
    const note = document.getElementById('doctorNote').value;
    const res = await put('/api/doctor/note', { auth_id: currentAuthId, note });
    if (res.code === 0) {
      showToast('建议保存成功');
    } else {
      showToast(res.message || '保存失败');
    }
  }

  function backToList() {
    listPage.style.display = 'block';
    reportPage.style.display = 'none';
  }

  function logout() {
    token = '';
    localStorage.removeItem('doctorToken');
    currentDoctor = null;
    loginPage.style.display = 'block';
    listPage.style.display = 'none';
    reportPage.style.display = 'none';
    document.getElementById('password').value = '';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // HTTP 封装
  async function request(method, url, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' }
    };
    if (token) opts.headers['Authorization'] = `Bearer ${token}`;
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API_BASE + url, opts);
    return res.json();
  }
  function get(url) { return request('GET', url, null); }
  function post(url, body) { return request('POST', url, body); }
  function put(url, body) { return request('PUT', url, body); }

  // 如果已有 token，自动进入列表
  if (token) {
    showList();
  }
</script>

</body>
</html>
